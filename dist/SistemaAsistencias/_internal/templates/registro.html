<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Asistencias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/registro.css') }}">

  <style>
    .fondo-registro {
      background: url("{{ url_for('static', filename='Images/backgroundCecyteh.png') }}") center/cover no-repeat;
    }

    .registro-card {
      width: 22rem;
      border-radius: 18px;
      animation: aparecerRegistro 0.5s ease;
      backdrop-filter: blur(2px);
    }

    @keyframes aparecerRegistro {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .titulo-registro {
      color: #4b4b4b;
      font-weight: 700;
    }

    .input-group-text {
      min-width: 46px;
      justify-content: center;
    }

    .btn-registro {
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 10px;
    }

    .btn-registro:disabled {
      opacity: 0.85;
    }

    .btn-outline-success {
      border-radius: 10px;
      font-weight: 600;
    }

    .btn-ver-password {
      border: 1px solid #ced4da;
      background: white;
      color: #6c757d;
    }

    .btn-ver-password:hover {
      background: #f8f9fa;
      color: #212529;
    }

    .alert {
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2">
        </a>
        <h1 id="Titulo" class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <main>
    <div class="d-flex justify-content-center align-items-center vh-100 fondo-registro">
      <div class="card shadow-lg p-4 registro-card">
        <h3 class="text-center mb-1 titulo-registro">Registros del personal</h3>
        <p class="text-center text-muted mb-4">Crea una nueva cuenta administrativa</p>

        <form id="formRegistro">
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" id="apellido_paterno" class="form-control" placeholder="Apellido Paterno" required>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" id="apellido_materno" class="form-control" placeholder="Apellido Materno" required>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa fa-envelope"></i></span>
            <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="contraseña" class="form-control" placeholder="Contraseña" required>
            <button class="btn btn-ver-password" type="button" id="togglePassword">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="confirmar" class="form-control" placeholder="Confirmar contraseña" required>
            <button class="btn btn-ver-password" type="button" id="toggleConfirmar">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-user-shield"></i></span>
            <select id="rol" class="form-select" disabled>
              <option value="admin" selected>admin</option>
            </select>
          </div>

          <div id="mensajeError" class="alert alert-danger d-none" role="alert"></div>
          <div id="mensajeExito" class="alert alert-success d-none" role="alert"></div>

          <button type="submit" class="btn btn-success w-100 mb-2 btn-registro" id="btnRegistro">
            <span id="textoBtnRegistro">REGISTRAR</span>
          </button>
          <a href="/login" class="btn btn-outline-success w-100">Regresar</a>
        </form>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById("formRegistro");
    const mensajeError = document.getElementById("mensajeError");
    const mensajeExito = document.getElementById("mensajeExito");
    const btnRegistro = document.getElementById("btnRegistro");
    const textoBtnRegistro = document.getElementById("textoBtnRegistro");

    const inputPassword = document.getElementById("contraseña");
    const inputConfirmar = document.getElementById("confirmar");
    const togglePassword = document.getElementById("togglePassword");
    const toggleConfirmar = document.getElementById("toggleConfirmar");

    togglePassword.addEventListener("click", function() {
      const tipo = inputPassword.getAttribute("type") === "password" ? "text" : "password";
      inputPassword.setAttribute("type", tipo);
      this.innerHTML = tipo === "password"
        ? '<i class="fa-solid fa-eye"></i>'
        : '<i class="fa-solid fa-eye-slash"></i>';
    });

    toggleConfirmar.addEventListener("click", function() {
      const tipo = inputConfirmar.getAttribute("type") === "password" ? "text" : "password";
      inputConfirmar.setAttribute("type", tipo);
      this.innerHTML = tipo === "password"
        ? '<i class="fa-solid fa-eye"></i>'
        : '<i class="fa-solid fa-eye-slash"></i>';
    });

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const nombre = document.getElementById("nombre").value.trim();
      const apellido_paterno = document.getElementById("apellido_paterno").value.trim();
      const apellido_materno = document.getElementById("apellido_materno").value.trim();
      const usuario = document.getElementById("usuario").value.trim();
      const contraseña = document.getElementById("contraseña").value.trim();
      const confirmar = document.getElementById("confirmar").value.trim();
      const rol = "admin";

      if (contraseña !== confirmar) {
        mensajeError.textContent = "❌ Las contraseñas no coinciden.";
        mensajeError.classList.remove("d-none");
        mensajeExito.classList.add("d-none");
        return;
      }

      btnRegistro.disabled = true;
      textoBtnRegistro.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registrando...';

      fetch("/api/registrar_usuario", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          nombre,
          apellido_paterno,
          apellido_materno,
          usuario,
          contraseña,
          rol,
          es_maestro: false
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          mensajeExito.textContent = "✅ Usuario registrado correctamente.";
          mensajeExito.classList.remove("d-none");
          mensajeError.classList.add("d-none");
          form.reset();
        } else {
          mensajeError.textContent = data.message || "❌ Error al registrar usuario.";
          mensajeError.classList.remove("d-none");
          mensajeExito.classList.add("d-none");
        }
      })
      .catch(err => {
        console.error("Error:", err);
        mensajeError.textContent = "❌ Error al conectar con el servidor.";
        mensajeError.classList.remove("d-none");
        mensajeExito.classList.add("d-none");
      })
      .finally(() => {
        btnRegistro.disabled = false;
        textoBtnRegistro.textContent = "REGISTRAR";
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
