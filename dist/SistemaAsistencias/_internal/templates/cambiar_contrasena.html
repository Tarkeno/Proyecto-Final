<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cambiar Contraseña</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/login.css') }}">

  <style>
    .fondo-login {
      background: url("{{ url_for('static', filename='Images/backgroundCecyteh.png') }}") center/cover no-repeat;
    }

    .cambiar-card {
      width: 24rem;
      border-radius: 18px;
      animation: aparecerCard 0.5s ease;
      backdrop-filter: blur(2px);
    }

    @keyframes aparecerCard {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .titulo-card {
      color: #4b4b4b;
      font-weight: 700;
    }

    .input-group-text {
      min-width: 46px;
      justify-content: center;
    }

    .btn-cambiar {
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 10px;
    }

    .btn-cambiar:disabled {
      opacity: 0.85;
    }

    .btn-outline-success {
      border-radius: 10px;
      font-weight: 600;
    }

    .btn-ver-password {
      border: 1px solid #ced4da;
      background: white;
      color: #6c757d;
    }

    .btn-ver-password:hover {
      background: #f8f9fa;
      color: #212529;
    }

    .alert {
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2">
        </a>
        <h1 id="Titulo" class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <main>
    <div class="d-flex justify-content-center align-items-center vh-100 fondo-login">
      <div class="card shadow-lg p-4 cambiar-card">
        <h3 class="text-center mb-1 titulo-card">Cambiar Contraseña</h3>
        <p class="text-center text-muted mb-4">Actualiza tu contraseña de acceso</p>

        <form id="formCambiarContrasena">
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="actual" class="form-control" placeholder="Contraseña actual" required>
            <button class="btn btn-ver-password" type="button" id="toggleActual">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
            <input type="password" id="nueva" class="form-control" placeholder="Nueva contraseña" required>
            <button class="btn btn-ver-password" type="button" id="toggleNueva">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
            <input type="password" id="confirmar" class="form-control" placeholder="Confirmar nueva contraseña" required>
            <button class="btn btn-ver-password" type="button" id="toggleConfirmar">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <button type="submit" class="btn btn-success w-100 mb-2 btn-cambiar" id="btnCambiar">
            <span id="textoBtnCambiar">CAMBIAR CONTRASEÑA</span>
          </button>
          <a href="/login" class="btn btn-outline-success w-100">VOLVER</a>
        </form>

        <div id="mensajeExito" class="alert alert-success mt-3 d-none" role="alert">
          ✅ Contraseña actualizada correctamente.
        </div>

        <div id="mensajeError" class="alert alert-danger mt-3 d-none" role="alert">
          ❌ Ocurrió un error.
        </div>
      </div>
    </div>
  </main>

  <script>
    const formCambiarContrasena = document.getElementById("formCambiarContrasena");
    const mensajeExito = document.getElementById("mensajeExito");
    const mensajeError = document.getElementById("mensajeError");
    const btnCambiar = document.getElementById("btnCambiar");
    const textoBtnCambiar = document.getElementById("textoBtnCambiar");

    function configurarTogglePassword(inputId, buttonId) {
      const input = document.getElementById(inputId);
      const button = document.getElementById(buttonId);

      button.addEventListener("click", function() {
        const tipo = input.getAttribute("type") === "password" ? "text" : "password";
        input.setAttribute("type", tipo);
        this.innerHTML = tipo === "password"
          ? '<i class="fa-solid fa-eye"></i>'
          : '<i class="fa-solid fa-eye-slash"></i>';
      });
    }

    configurarTogglePassword("actual", "toggleActual");
    configurarTogglePassword("nueva", "toggleNueva");
    configurarTogglePassword("confirmar", "toggleConfirmar");

    formCambiarContrasena.addEventListener("submit", function(e) {
      e.preventDefault();

      const usuario = document.getElementById("usuario").value.trim();
      const actual = document.getElementById("actual").value.trim();
      const nueva = document.getElementById("nueva").value.trim();
      const confirmar = document.getElementById("confirmar").value.trim();

      mensajeExito.classList.add("d-none");
      mensajeError.classList.add("d-none");

      if (nueva !== confirmar) {
        mensajeError.textContent = "❌ La nueva contraseña y la confirmación no coinciden.";
        mensajeError.classList.remove("d-none");
        return;
      }

      btnCambiar.disabled = true;
      textoBtnCambiar.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Cambiando...';

      fetch("/api/cambiar-contrasena", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          usuario,
          actual,
          nueva
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          mensajeExito.textContent = data.message || "✅ Contraseña actualizada correctamente.";
          mensajeExito.classList.remove("d-none");
          mensajeError.classList.add("d-none");
          formCambiarContrasena.reset();
        } else {
          mensajeError.textContent = data.message || "❌ No se pudo cambiar la contraseña.";
          mensajeError.classList.remove("d-none");
          mensajeExito.classList.add("d-none");
        }
      })
      .catch(err => {
        console.error("Error:", err);
        mensajeError.textContent = "❌ Error al conectar con el servidor.";
        mensajeError.classList.remove("d-none");
        mensajeExito.classList.add("d-none");
      })
      .finally(() => {
        btnCambiar.disabled = false;
        textoBtnCambiar.textContent = "CAMBIAR CONTRASEÑA";
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
