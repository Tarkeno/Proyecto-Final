<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reporte Estudiantes - Asistencias</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/RG_Estudiantes_Asistencias.css') }}" />
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2" />
        </a>
        <h1 class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <div id="titulo2">
    <h2>REPORTE DE ESTUDIANTES - ASISTENCIAS</h2>
  </div>

  <div class="acciones">
    <div>
      <button onclick="imprimirSoloTabla()" class="btn btn-outline-dark">
        <i class="fa-solid fa-print"></i> Imprimir
      </button>
      <button onclick="guardarReporte()" class="btn btn-outline-success">
        <i class="fa-solid fa-floppy-disk"></i> Guardar
      </button>
    </div>

    <a href="/reportes" class="btn btn-secondary volver-btn">
      <i class="fa-solid fa-arrow-left"></i> Volver
    </a>
  </div>

  <div id="solo-tabla" class="tabla-reporte">
    <table class="table table-bordered table-striped" id="tablaEstudiantesAsistencias">
      <thead>
        <tr>
          <th>Matrícula</th>
          <th>Nombre</th>
          <th>Apellido Paterno</th>
          <th>Apellido Materno</th>
          <th>Carrera</th>
          <th>Semestre</th>
          <th>Grupo</th>
          <th>Fecha</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script>
function cargarAsistenciasEstudiantes() {
  const params = new URLSearchParams(window.location.search);
  const inicio = params.get("inicio");
  const fin = params.get("fin");
  const carrera = params.get("carrera");
  const semestre = params.get("semestre");
  const grupo = params.get("grupo");

  if (!inicio || !fin || !carrera || !semestre || !grupo) {
    alert("Faltan parámetros para generar el reporte.");
    return;
  }

  fetch("/api/listar-asistencias", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      fecha_inicio: inicio,
      fecha_fin: fin,
      comunidad: "estudiantes",
      tipo_reporte: "asistencias",
      carrera: carrera,
      semestre: semestre,
      grupo: grupo
    })
  })
  .then(res => res.json())
  .then(data => {
    const tbody = document.querySelector("#tablaEstudiantesAsistencias tbody");
    tbody.innerHTML = "";

    if (data.success) {
      data.resultados.forEach(a => {
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${a.matricula}</td>
          <td>${a.nombre}</td>
          <td>${a.apellido_paterno}</td>
          <td>${a.apellido_materno}</td>
          <td>${a.carrera}</td>
          <td>${a.semestre}</td>
          <td>${a.grupo}</td>
          <td>${a.fecha}</td>
          <td>${a.estado_asistencia}</td>
        `;
        tbody.appendChild(fila);
      });

      if (data.resultados.length === 0) {
        alert("No se encontraron registros para esos filtros.");
      }
    } else {
      alert(data.message || "No se encontraron registros.");
    }
  })
  .catch(err => {
    console.error("Error:", err);
    alert("No se pudo conectar con el servidor.");
  });
}

function guardarReporte() {
  const params = new URLSearchParams(window.location.search);
  const inicio = params.get("inicio") || "";
  const fin = params.get("fin") || "";
  const carrera = params.get("carrera") || "";
  const semestre = params.get("semestre") || "";
  const grupo = params.get("grupo") || "";

  const url = `/api/reporte_grupal_estudiantes/pdf?tipo=asistencias&inicio=${encodeURIComponent(inicio)}&fin=${encodeURIComponent(fin)}&carrera=${encodeURIComponent(carrera)}&semestre=${encodeURIComponent(semestre)}&grupo=${encodeURIComponent(grupo)}`;

  window.open(url, "_blank");
}

function imprimirSoloTabla() {
  const tabla = document.getElementById("solo-tabla");

  if (!tabla) {
    alert("No se encontró la tabla para imprimir.");
    return;
  }

  const contenido = tabla.innerHTML;

  const ventana = window.open("", "_blank", "width=1100,height=700");

  ventana.document.write(`
    <html>
      <head>
        <title>Reporte</title>
        <style>
          body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #000;
          }

          h2 {
            text-align: center;
            margin-bottom: 20px;
          }

          table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
          }

          th, td {
            border: 1px solid #000;
            padding: 6px;
            text-align: center;
          }

          th {
            background: #f2f2f2;
          }
        </style>
      </head>
      <body>
        ${contenido}
      </body>
    </html>
  `);

  ventana.document.close();
  ventana.focus();

  setTimeout(() => {
    ventana.print();
    ventana.close();
  }, 500);
}

window.onload = cargarAsistenciasEstudiantes;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
