<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/Reportes.css') }}">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-danger" id="Titulo2">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2">
                </a>
                <h1 id="Titulo" class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
            </div>
        </nav>
    </header>

    <div id="titulo2">
        <h2>PANEL ADMINISTRATIVO</h2>
    </div>

    <main class="d-flex">
        <nav class="panel_lateral">
            <aside>
                <div class="list-group">
                    <a href="/panel-inicio" class="list-group-item list-group-item-action">
                        <i class="fa-solid fa-house me-2"></i> Inicio
                    </a>
                    <a href="/historial" class="list-group-item list-group-item-action">
                        <i class="fa-solid fa-file-lines me-2"></i> Historial
                    </a>
                    <a href="/estudiantes" class="list-group-item list-group-item-action">
                        <i class="fa-solid fa-user-graduate me-2"></i> Estudiantes
                    </a>
                    <a href="/docentes" class="list-group-item list-group-item-action">
                        <i class="fa-solid fa-chalkboard-user me-2"></i> Personal
                    </a>
                    <a href="/reportes" class="list-group-item list-group-item-action active">
                        <i class="fa-solid fa-chart-line me-2"></i> Reportes
                    </a>
                    <a href="/agregar" class="list-group-item list-group-item-action">
                        <i class="fa-solid fa-plus me-2"></i> Agregar Estudiante
                    </a>
                    <a href="/agregar-personal" class="list-group-item list-group-item-action">
                        <i class="fa-solid fa-plus me-2"></i> Agregar Personal
                    </a>
                    <a href="/verificacion-usuarios" class="list-group-item list-group-item-action">
                        <i class="fa-solid fa-check me-2"></i> Verificación
                    </a>
                     {% if session.get('es_maestro') %}
          <a href="/administrar-usuarios" class="list-group-item list-group-item-action">
                    <i class="fa-solid fa-users-gear me-2"></i> Administrar Usuarios
                </a>
          {% endif %}
                    <a href="#" class="list-group-item list-group-item-action" onclick="confirmarSalida(event)">
                        <i class="fa-solid fa-sign-out-alt me-2"></i> Salir
                    </a>
                </div>
            </aside>
        </nav>

        <section class="contenido-principal flex-grow-1">
            <div class="card shadow-sm formulario-reporte">
                <div class="card-body">
                    <h2 class="mb-4 text-center">Fecha y Tipo de Reporte</h2>

                    <div id="mensaje" class="alert d-none mb-3" role="alert"></div>

                    <label for="Fecha_Inicio" class="form-label">Fecha Inicio:</label>
                    <input type="date" id="Fecha_Inicio" name="Fecha_Inicio" class="form-control mb-3">

                    <label for="Fecha_Fin" class="form-label">Fecha Fin:</label>
                    <input type="date" id="Fecha_Fin" name="fecha" class="form-control mb-3">

                    <label for="comunidad" class="form-label"><strong>Comunidad educativa</strong></label>
                    <select id="comunidad" name="comunidad" class="form-select mb-3">
                        <option value="" disabled selected>-- Selecciona una opción --</option>
                        <option value="estudiantes">Estudiantes</option>
                        <option value="docentes">Docentes</option>
                        <option value="administrativo">Personal administrativo y directivo</option>
                    </select>

                    <div id="camposEstudiante" style="display:none;">
                        <label for="carreras" class="form-label"><strong>Carrera</strong></label>
                        <select id="carreras" name="carreras" class="form-select mb-3">
                            <option value="" disabled selected>-- Selecciona una opción --</option>
                            <option value="Enfermería General">Enfermería General</option>
                            <option value="Laboratorio Clínico">Laboratorio Clínico</option>
                            <option value="Mecatrónica">Mecatrónica</option>
                        </select>

                        <label for="Semestre" class="form-label"><strong>Semestre</strong></label>
                        <select id="Semestre" name="Semestre" class="form-select mb-3">
                            <option value="" disabled selected>-- Selecciona una opción --</option>
                            <option value="1">Primero</option>
                            <option value="2">Segundo</option>
                            <option value="3">Tercero</option>
                            <option value="4">Cuarto</option>
                            <option value="5">Quinto</option>
                            <option value="6">Sexto</option>
                        </select>

                        <label for="Grupo" class="form-label"><strong>Grupo</strong></label>
                        <select id="Grupo" name="Grupo" class="form-select mb-3">
                            <option value="" disabled selected>-- Selecciona una opción --</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                            <option value="G">G</option>
                            <option value="H">H</option>
                        </select>
                    </div>

                    <label for="reporte" class="form-label"><strong>Tipo de reporte</strong></label>
                    <select id="reporte" name="reporte" class="form-select mb-3">
                        <option value="" disabled selected>-- Selecciona una opción --</option>
                        <option value="general">Reporte General</option>
                        <option value="asistencias">Asistencias</option>
                        <option value="inasistencias">Inasistencias</option>
                        <option value="justificaciones">Justificaciones</option>
                    </select>

                    <div class="d-flex gap-3 mt-4 justify-content-center">
                        <button onclick="redirigir()" class="btn btn-danger">Generar reporte</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const comunidad = document.getElementById("comunidad");
        const camposEstudiante = document.getElementById("camposEstudiante");

        function mostrarMensaje(texto, tipo = "success") {
            const div = document.getElementById("mensaje");
            div.className = `alert alert-${tipo} mb-3`;
            div.textContent = texto;
            div.classList.remove("d-none");

            setTimeout(() => {
                div.classList.add("d-none");
            }, 3500);
        }

        comunidad.addEventListener("change", function () {
            camposEstudiante.style.display = this.value === "estudiantes" ? "block" : "none";
        });

        function redirigir() {
            const seleccion = comunidad.value;
            const reporte = document.getElementById("reporte").value;
            const fechaInicio = document.getElementById("Fecha_Inicio").value;
            const fechaFin = document.getElementById("Fecha_Fin").value;

            if (!seleccion || !reporte || !fechaInicio || !fechaFin) {
                mostrarMensaje("Completa todos los campos requeridos.", "warning");
                return;
            }

            if (fechaFin < fechaInicio) {
                mostrarMensaje("La fecha final no puede ser anterior a la fecha de inicio.", "danger");
                return;
            }

            let destino = "";

            if (seleccion === "estudiantes") {
                const carrera = document.getElementById("carreras").value;
                const semestre = document.getElementById("Semestre").value;
                const grupo = document.getElementById("Grupo").value;

                if (!carrera || !semestre || !grupo) {
                    mostrarMensaje("Completa todos los campos de estudiante.", "warning");
                    return;
                }

                if (reporte === "asistencias") destino = "/reportes-grupales-estudiantes-asistencias";
                else if (reporte === "general") destino = "/reportes-grupales-estudiantes-general";
                else if (reporte === "inasistencias") destino = "/reportes-grupales-estudiantes-inasistencias";
                else if (reporte === "justificaciones") destino = "/reportes-grupales-estudiantes-justificaciones";

                if (destino) {
                    window.location.href = `${destino}?inicio=${encodeURIComponent(fechaInicio)}&fin=${encodeURIComponent(fechaFin)}&carrera=${encodeURIComponent(carrera)}&semestre=${encodeURIComponent(semestre)}&grupo=${encodeURIComponent(grupo)}`;
                    return;
                }
            }

            if (seleccion === "docentes") {
                if (reporte === "asistencias") destino = "/reportes-grupales-docentes-asistencias";
                else if (reporte === "general") destino = "/reportes-grupales-docentes-general";
                else if (reporte === "inasistencias") destino = "/reportes-grupales-docentes-inasistencias";
                else if (reporte === "justificaciones") destino = "/reportes-grupales-docentes-justificaciones";

                if (destino) {
                    window.location.href = `${destino}?inicio=${encodeURIComponent(fechaInicio)}&fin=${encodeURIComponent(fechaFin)}`;
                    return;
                }
            }

            if (seleccion === "administrativo") {
                if (reporte === "asistencias") destino = "/reportes-grupales-administrativo-asistencias";
                else if (reporte === "general") destino = "/reportes-grupales-administrativo-general";
                else if (reporte === "inasistencias") destino = "/reportes-grupales-administrativo-inasistencias";
                else if (reporte === "justificaciones") destino = "/reportes-grupales-administrativo-justificaciones";

                if (destino) {
                    window.location.href = `${destino}?inicio=${encodeURIComponent(fechaInicio)}&fin=${encodeURIComponent(fechaFin)}`;
                    return;
                }
            }

            mostrarMensaje("No se encontró una ruta para ese tipo de reporte.", "danger");
        }

        function confirmarSalida(e) {
  e.preventDefault();

  Swal.fire({
    title: '¿Salir del sistema?',
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#dc3545',
    cancelButtonColor: '#6c757d',
    confirmButtonText: 'Sí, salir',
    cancelButtonText: 'Cancelar'
  }).then((result) => {
    if (result.isConfirmed) {
      window.location.href = "/login";
    }
  });
}
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
