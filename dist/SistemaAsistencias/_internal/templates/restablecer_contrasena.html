<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restablecer Contraseña</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/login.css') }}">

  <style>
    .fondo-login {
      background: url("{{ url_for('static', filename='Images/backgroundCecyteh.png') }}") center/cover no-repeat;
    }

    .restablecer-card {
      width: 26rem;
      border-radius: 18px;
      animation: aparecerCard 0.5s ease;
      backdrop-filter: blur(2px);
    }

    @keyframes aparecerCard {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .titulo-card {
      color: #4b4b4b;
      font-weight: 700;
    }

    .input-group-text {
      min-width: 46px;
      justify-content: center;
    }

    .btn-restablecer {
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 10px;
    }

    .btn-restablecer:disabled {
      opacity: 0.85;
    }

    .btn-outline-success {
      border-radius: 10px;
      font-weight: 600;
    }

    .btn-ver-password {
      border: 1px solid #ced4da;
      background: white;
      color: #6c757d;
    }

    .btn-ver-password:hover {
      background: #f8f9fa;
      color: #212529;
    }

    .alert {
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2">
        </a>
        <h1 id="Titulo" class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <main>
    <div class="d-flex justify-content-center align-items-center vh-100 fondo-login">
      <div class="card shadow-lg p-4 restablecer-card">
        <h3 class="text-center mb-1 titulo-card">Restablecer Contraseña</h3>
        <p class="text-center text-muted mb-4">Solo una cuenta master puede cambiar la contraseña de otro usuario</p>

        <form id="formRestablecer">
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-user-shield"></i></span>
            <input type="text" id="usuarioMaster" class="form-control" placeholder="Usuario master" required>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="passwordMaster" class="form-control" placeholder="Contraseña master" required>
            <button class="btn btn-ver-password" type="button" id="togglePasswordMaster">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" id="usuarioObjetivo" class="form-control" placeholder="Usuario a restablecer" required>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
            <input type="password" id="nuevaPassword" class="form-control" placeholder="Nueva contraseña" required>
            <button class="btn btn-ver-password" type="button" id="toggleNuevaPassword">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
            <input type="password" id="confirmarPassword" class="form-control" placeholder="Confirmar nueva contraseña" required>
            <button class="btn btn-ver-password" type="button" id="toggleConfirmarPassword">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <button type="submit" class="btn btn-success w-100 mb-2 btn-restablecer" id="btnRestablecer">
            <span id="textoBtnRestablecer">RESTABLECER CONTRASEÑA</span>
          </button>
          <a href="/login" class="btn btn-outline-success w-100">VOLVER</a>
        </form>

        <div id="mensajeExito" class="alert alert-success mt-3 d-none" role="alert"></div>
        <div id="mensajeError" class="alert alert-danger mt-3 d-none" role="alert"></div>
      </div>
    </div>
  </main>

  <script>
    const formRestablecer = document.getElementById("formRestablecer");
    const mensajeExito = document.getElementById("mensajeExito");
    const mensajeError = document.getElementById("mensajeError");
    const btnRestablecer = document.getElementById("btnRestablecer");
    const textoBtnRestablecer = document.getElementById("textoBtnRestablecer");

    function configurarTogglePassword(inputId, buttonId) {
      const input = document.getElementById(inputId);
      const button = document.getElementById(buttonId);

      button.addEventListener("click", function() {
        const tipo = input.getAttribute("type") === "password" ? "text" : "password";
        input.setAttribute("type", tipo);
        this.innerHTML = tipo === "password"
          ? '<i class="fa-solid fa-eye"></i>'
          : '<i class="fa-solid fa-eye-slash"></i>';
      });
    }

    configurarTogglePassword("passwordMaster", "togglePasswordMaster");
    configurarTogglePassword("nuevaPassword", "toggleNuevaPassword");
    configurarTogglePassword("confirmarPassword", "toggleConfirmarPassword");

    formRestablecer.addEventListener("submit", function(e) {
      e.preventDefault();

      const usuario_master = document.getElementById("usuarioMaster").value.trim();
      const password_master = document.getElementById("passwordMaster").value.trim();
      const usuario_objetivo = document.getElementById("usuarioObjetivo").value.trim();
      const nueva_password = document.getElementById("nuevaPassword").value.trim();
      const confirmar_password = document.getElementById("confirmarPassword").value.trim();

      mensajeExito.classList.add("d-none");
      mensajeError.classList.add("d-none");

      if (nueva_password !== confirmar_password) {
        mensajeError.textContent = "❌ La nueva contraseña y la confirmación no coinciden.";
        mensajeError.classList.remove("d-none");
        return;
      }

      btnRestablecer.disabled = true;
      textoBtnRestablecer.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Restableciendo...';

      fetch("/api/restablecer-contrasena", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          usuario_master,
          password_master,
          usuario_objetivo,
          nueva_password
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          mensajeExito.textContent = data.message || "✅ Contraseña restablecida correctamente.";
          mensajeExito.classList.remove("d-none");
          mensajeError.classList.add("d-none");
          formRestablecer.reset();
        } else {
          mensajeError.textContent = data.message || "❌ No se pudo restablecer la contraseña.";
          mensajeError.classList.remove("d-none");
          mensajeExito.classList.add("d-none");
        }
      })
      .catch(err => {
        console.error(err);
        mensajeError.textContent = "❌ Error al conectar con el servidor.";
        mensajeError.classList.remove("d-none");
        mensajeExito.classList.add("d-none");
      })
      .finally(() => {
        btnRestablecer.disabled = false;
        textoBtnRestablecer.textContent = "RESTABLECER CONTRASEÑA";
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
