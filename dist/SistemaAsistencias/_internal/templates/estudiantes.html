<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/Estilos_Estudiantes_matricula.css') }}">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger" id="Titulo2">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2">
        </a>
        <h1 id="Titulo" class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <div id="titulo2">
    <h2>PANEL ADMINISTRATIVO</h2>
  </div>

  <main class="d-flex">
    <nav class="panel_lateral" style="width:250px;">
      <aside>
        <div class="list-group">
          <a href="/panel-inicio" class="list-group-item list-group-item-action"><i class="fa-solid fa-house me-2"></i> Inicio</a>
          <a href="/historial" class="list-group-item list-group-item-action"><i class="fa-solid fa-file-lines me-2"></i> Historial</a>
          <a href="/estudiantes" class="list-group-item list-group-item-action active"><i class="fa-solid fa-user-graduate me-2"></i> Estudiantes</a>
          <a href="/docentes" class="list-group-item list-group-item-action"><i class="fa-solid fa-chalkboard-user me-2"></i> Personal</a>
          <a href="/reportes" class="list-group-item list-group-item-action"><i class="fa-solid fa-chart-line me-2"></i> Reportes</a>
          <a href="/agregar" class="list-group-item list-group-item-action"><i class="fa-solid fa-plus me-2"></i> Agregar Estudiante</a>
          <a href="/agregar-personal" class="list-group-item list-group-item-action"><i class="fa-solid fa-plus me-2"></i> Agregar Personal</a>
          <a href="/verificacion-usuarios" class="list-group-item list-group-item-action"><i class="fa-solid fa-check me-2"></i> Verificación</a>
           {% if session.get('es_maestro') %}
          <a href="/administrar-usuarios" class="list-group-item list-group-item-action">
                    <i class="fa-solid fa-users-gear me-2"></i> Administrar Usuarios
                </a>
          {% endif %}
          <a href="#" class="list-group-item list-group-item-action" onclick="confirmarSalida(event)"><i class="fa-solid fa-sign-out-alt me-2"></i> Salir</a>
        </div>
      </aside>
    </nav>

    <section class="flex-grow-1 d-flex justify-content-center align-items-start" style="max-width: calc(100% - 250px); min-width: 300px; padding-top:20px;">
      <div class="card shadow-sm w-100" style="max-width: 500px;">
        <div class="card-body">
          <h4 class="card-title mb-4">Información del estudiante</h4>

          <div id="mensaje" class="alert d-none mb-3" role="alert"></div>

          <div class="mb-3">
            <label for="matricula" class="form-label">
              <i class="fa-solid fa-user me-2"></i> Matrícula del estudiante:
            </label>
            <input type="text" id="matricula" class="form-control" placeholder="Ingrese matrícula del estudiante" required>
          </div>

          <button id="buscar-btn" class="btn btn-success w-100">BUSCAR ESTUDIANTE</button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    function mostrarMensaje(texto, tipo = "success") {
      const div = document.getElementById("mensaje");
      div.className = `alert alert-${tipo} mb-3`;
      div.textContent = texto;
      div.classList.remove("d-none");

      setTimeout(() => {
        div.classList.add("d-none");
      }, 3000);
    }

    document.getElementById("buscar-btn").addEventListener("click", function (e) {
      e.preventDefault();
      const matricula = document.getElementById("matricula").value.trim();

      if (!matricula) {
        mostrarMensaje("Por favor ingrese una matrícula.", "warning");
        return;
      }

      fetch("/buscar_estudiante", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ matricula: matricula })
      })
      .then(response => response.json())
      .then(data => {
        if (data.error) {
          mostrarMensaje("Estudiante no encontrado.", "danger");
        } else {
          localStorage.setItem("estudiante", JSON.stringify(data));
          window.location.href = "/informacion-estudiante";
        }
      })
      .catch(error => {
        console.error("Error al buscar estudiante:", error);
        mostrarMensaje("Error al conectar con el servidor.", "danger");
      });
    });

    function confirmarSalida(e) {
  e.preventDefault();

  Swal.fire({
    title: '¿Salir del sistema?',
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#dc3545',
    cancelButtonColor: '#6c757d',
    confirmButtonText: 'Sí, salir',
    cancelButtonText: 'Cancelar'
  }).then((result) => {
    if (result.isConfirmed) {
      window.location.href = "/login";
    }
  });
}
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
