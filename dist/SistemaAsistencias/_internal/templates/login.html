<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Asistencias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/login.css') }}">

  <style>
    .fondo-login {
      background: url("{{ url_for('static', filename='Images/backgroundCecyteh.png') }}") center/cover no-repeat;
    }

    .login-card {
      width: 22rem;
      border-radius: 18px;
      animation: aparecerLogin 0.5s ease;
      backdrop-filter: blur(2px);
    }

    @keyframes aparecerLogin {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .titulo-login {
      color: #4b4b4b;
      font-weight: 700;
    }

    .btn-login {
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 10px;
    }

    .btn-login:disabled {
      opacity: 0.85;
    }

    .btn-outline-success {
      border-radius: 10px;
      font-weight: 600;
    }

    .input-group-text {
      min-width: 46px;
      justify-content: center;
    }

    .btn-ver-password {
      border: 1px solid #ced4da;
      background: white;
      color: #6c757d;
    }

    .btn-ver-password:hover {
      background: #f8f9fa;
      color: #212529;
    }

    .link-login {
      color: #5b77d1;
      font-weight: 500;
      transition: 0.2s ease;
    }

    .link-login:hover {
      color: #2f58c8;
      text-decoration: underline !important;
    }

    .alert {
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2">
        </a>
        <h1 id="Titulo" class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <main>
    <div class="d-flex justify-content-center align-items-center vh-100 fondo-login">
      <div class="card shadow-lg p-4 login-card">
        <h3 class="text-center mb-1 titulo-login">Registros de Asistencias</h3>
        <p class="text-center text-muted mb-4">Inicia sesión para acceder al sistema</p>

        <form id="formLogin">
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="contraseña" class="form-control" placeholder="Contraseña" required>
            <button class="btn btn-ver-password" type="button" id="togglePassword">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <button type="submit" class="btn btn-success w-100 mb-2 btn-login" id="btnLogin">
            <span id="textoBtnLogin">INICIAR SESIÓN</span>
          </button>

          <div class="text-center mb-2">
            <a href="/cambiar-contrasena" class="text-decoration-none link-login">Cambiar Contraseña</a>
          </div>

          <div class="text-center mb-3">
            <a href="/restablecer-contrasena" class="text-decoration-none link-login">Restablecer contraseña (Master)</a>
          </div>

          <button type="button" class="btn btn-outline-success w-100" data-bs-toggle="modal" data-bs-target="#modalMaestro">
            REGISTRAR
          </button>
        </form>

        <div id="mensajeError" class="alert alert-danger mt-3 d-none" role="alert">
          ❌ Usuario o contraseña incorrectos.
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="modalMaestro" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="formMaestro">
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title">Validar cuenta maestra</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div class="input-group mb-3">
              <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
              <input type="text" id="usuarioMaestro" class="form-control" placeholder="Usuario maestro" required>
            </div>

            <div class="input-group mb-3">
              <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
              <input type="password" id="contraseñaMaestro" class="form-control" placeholder="Contraseña" required>
              <button class="btn btn-ver-password" type="button" id="togglePasswordMaster">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>

            <div id="mensajeMaestro" class="alert alert-danger d-none">
              ❌ Usuario o contraseña incorrectos.
            </div>
          </div>

          <div class="modal-footer">
            <button type="submit" class="btn btn-success" id="btnValidarMaestro">
              <span id="textoBtnMaestro">Validar</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const formLogin = document.getElementById("formLogin");
    const mensajeError = document.getElementById("mensajeError");
    const btnLogin = document.getElementById("btnLogin");
    const textoBtnLogin = document.getElementById("textoBtnLogin");

    const togglePassword = document.getElementById("togglePassword");
    const inputPassword = document.getElementById("contraseña");

    togglePassword.addEventListener("click", function() {
      const tipo = inputPassword.getAttribute("type") === "password" ? "text" : "password";
      inputPassword.setAttribute("type", tipo);
      this.innerHTML = tipo === "password"
        ? '<i class="fa-solid fa-eye"></i>'
        : '<i class="fa-solid fa-eye-slash"></i>';
    });

    formLogin.addEventListener("submit", function(e) {
      e.preventDefault();

      const usuario = document.getElementById("usuario").value.trim();
      const contraseña = document.getElementById("contraseña").value.trim();

      btnLogin.disabled = true;
      textoBtnLogin.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Ingresando...';

      fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, contraseña })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem("usuario", data.usuario);
          localStorage.setItem("rol", data.rol);
          localStorage.setItem("es_maestro", data.es_maestro);

          window.location.href = "/panel-inicio";
        } else {
          mensajeError.textContent = data.message || "❌ No se pudo iniciar sesión.";
          mensajeError.classList.remove("d-none");
          setTimeout(() => mensajeError.classList.add("d-none"), 4000);
        }
      })
      .catch(err => {
        console.error("Error:", err);
        mensajeError.textContent = "❌ Error al conectar con el servidor.";
        mensajeError.classList.remove("d-none");
      })
      .finally(() => {
        btnLogin.disabled = false;
        textoBtnLogin.textContent = "INICIAR SESIÓN";
      });
    });

    const formMaestro = document.getElementById("formMaestro");
    const mensajeMaestro = document.getElementById("mensajeMaestro");
    const btnValidarMaestro = document.getElementById("btnValidarMaestro");
    const textoBtnMaestro = document.getElementById("textoBtnMaestro");

    const togglePasswordMaster = document.getElementById("togglePasswordMaster");
    const inputPasswordMaster = document.getElementById("contraseñaMaestro");

    togglePasswordMaster.addEventListener("click", function() {
      const tipo = inputPasswordMaster.getAttribute("type") === "password" ? "text" : "password";
      inputPasswordMaster.setAttribute("type", tipo);
      this.innerHTML = tipo === "password"
        ? '<i class="fa-solid fa-eye"></i>'
        : '<i class="fa-solid fa-eye-slash"></i>';
    });

    formMaestro.addEventListener("submit", function(e) {
      e.preventDefault();

      const usuario = document.getElementById("usuarioMaestro").value.trim();
      const contraseña = document.getElementById("contraseñaMaestro").value.trim();

      btnValidarMaestro.disabled = true;
      textoBtnMaestro.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Validando...';

      fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, contraseña })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success && data.es_maestro) {
          window.location.href = "/registro";
        } else {
          mensajeMaestro.textContent = data.message || "❌ Usuario o contraseña incorrectos.";
          mensajeMaestro.classList.remove("d-none");
          setTimeout(() => mensajeMaestro.classList.add("d-none"), 4000);
        }
      })
      .catch(err => {
        console.error("Error:", err);
        mensajeMaestro.textContent = "❌ Error al conectar con el servidor.";
        mensajeMaestro.classList.remove("d-none");
      })
      .finally(() => {
        btnValidarMaestro.disabled = false;
        textoBtnMaestro.textContent = "Validar";
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
