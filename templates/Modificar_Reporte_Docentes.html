<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modificar Reporte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/MR_Personal.css') }}" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2" />
        </a>
        <h1 class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <div id="titulo2">
    <h2>MODIFICAR REPORTE DEL PERSONAL</h2>
  </div>

  <div class="acciones-superior">
    <div class="d-flex gap-2">
      <button class="btn btn-success" id="btnGuardar">
        <i class="fa-solid fa-floppy-disk"></i> Guardar
      </button>
      <button class="btn btn-primary" id="btnActualizar">
        <i class="fa-solid fa-rotate"></i> Actualizar
      </button>
      <a href="/reporte-docentes" class="btn btn-secondary">
        <i class="fa-solid fa-arrow-left"></i> Volver
      </a>
    </div>
  </div>

  <div class="tabla-edicion">
    <table class="table table-bordered table-striped">
      <thead>
        <tr>
          <th>Clave</th>
          <th>Nombre</th>
          <th>Apellido Paterno</th>
          <th>Apellido Materno</th>
          <th>Puesto</th>
          <th>Fecha</th>
          <th>Modificar Asistencia</th>
          <th>Eliminar</th> 
        </tr>
      </thead>
      <tbody id="tabla-registros-docentes"></tbody>
    </table>
  </div>

  <script>
    function cargarAsistencias(clave, inicio, fin) {
      fetch(`/api/modificar-reporte-personal?clave=${encodeURIComponent(clave || "")}&inicio=${encodeURIComponent(inicio || "")}&fin=${encodeURIComponent(fin || "")}`)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById("tabla-registros-docentes");
          tbody.innerHTML = "";

          if (!data || data.length === 0) {
            alert("No se encontraron registros en el rango de fechas seleccionado.");
            return;
          }

          data.forEach(registro => {
            let fechaFormateada = "Fecha inválida";
            if (registro.fecha && /^\d{4}-\d{2}-\d{2}$/.test(registro.fecha)) {
              const [a, m, d] = registro.fecha.split("-");
              fechaFormateada = `${d}/${m}/${a}`;
            }

            const id = `${registro.clave}_${registro.fecha}`;

            const fila = document.createElement("tr");
            fila.innerHTML = `
              <td>${registro.clave}</td>
              <td>${registro.nombre}</td>
              <td>${registro.apellido_paterno}</td>
              <td>${registro.apellido_materno}</td>
              <td>${registro.puesto}</td>
              <td>${fechaFormateada}</td>
              <td>
                <select class="form-select estado-asistencia" data-id="${id}">
                  <option value="">-- Selecciona --</option>
                  <option value="Justificación" ${registro.estado_asistencia === "Justificación" ? "selected" : ""}>Justificación</option>
                  <option value="Asistencia" ${registro.estado_asistencia === "Asistencia" ? "selected" : ""}>Asistencia</option>
                  <option value="Inasistencia" ${registro.estado_asistencia === "Inasistencia" ? "selected" : ""}>Inasistencia</option>
                </select>
              </td>
              <td>
                <button class="btn btn-sm btn-danger eliminar-fila">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </td>
            `;
            tbody.appendChild(fila);
          });
        })
        .catch(error => {
          console.error("Error al cargar asistencias:", error);
          alert("Hubo un problema al conectar con el servidor.");
        });
    }

    window.addEventListener("DOMContentLoaded", function () {
      const params = new URLSearchParams(window.location.search);
      const clave = params.get("clave");
      const inicio = params.get("inicio");
      const fin = params.get("fin");

      if (!clave || !inicio || !fin) {
        alert("Faltan parámetros en la URL.");
        return;
      }

      cargarAsistencias(clave, inicio, fin);

      document.getElementById("btnActualizar").addEventListener("click", function () {
        cargarAsistencias(clave, inicio, fin);
      });

      document.getElementById("btnGuardar").addEventListener("click", function () {
        const cambios = [];

        document.querySelectorAll(".estado-asistencia").forEach(select => {
          const id = select.dataset.id;
          const [clave, fecha] = id.split("_");
          const estado = select.value;

          if (estado) {
            cambios.push({ clave, fecha, estado_asistencia: estado });
          }
        });

        fetch("/api/guardar-cambios-personal", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cambios })
        })
        .then(res => res.json())
        .then(response => {
          if (response.success) {
            alert("Cambios guardados correctamente.");
          } else {
            alert(response.message || "No se pudieron guardar los cambios.");
          }
        })
        .catch(error => {
          console.error("Error al guardar cambios:", error);
          alert("Hubo un problema al guardar los cambios.");
        });
      });

      document.getElementById("tabla-registros-docentes").addEventListener("click", function (e) {
        if (e.target.closest(".eliminar-fila")) {
          const fila = e.target.closest("tr");
          const id = fila.querySelector(".estado-asistencia")?.dataset.id;

          if (confirm("¿Eliminar esta fila del reporte?")) {
            fila.remove();

            if (id) {
              const [clave, fecha] = id.split("_");
              fetch("/api/eliminar-registro-personal", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ clave, fecha })
              })
              .then(res => res.json())
              .then(response => {
                if (response.success) {
                  alert("Registro eliminado correctamente.");
                } else {
                  alert(response.message || "No se pudo eliminar el registro.");
                }
              })
              .catch(error => {
                console.error("Error al eliminar registro:", error);
                alert("Hubo un problema al eliminar el registro.");
              });
            }
          }
        }
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
