<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/Reporte_Estudiantes.css') }}" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger" id="Titulo2">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2" />
        </a>
        <h1 id="Titulo" class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <div id="titulo2">
    <h2>PANEL ADMINISTRATIVO</h2>
  </div>

  <main class="d-flex" style="height:100vh;">
    <nav class="panel_lateral" style="width:250px;">
      <aside>
        <div class="list-group">
          <a href="/historial" class="list-group-item list-group-item-action"><i class="fa-solid fa-file-lines me-2"></i> Historial</a>
          <a href="/estudiantes" class="list-group-item list-group-item-action"><i class="fa-solid fa-user-graduate me-2"></i> Estudiantes</a>
          <a href="/docentes" class="list-group-item list-group-item-action"><i class="fa-solid fa-chalkboard-user me-2"></i> Personal</a>
          <a href="/reportes" class="list-group-item list-group-item-action"><i class="fa-solid fa-chart-line me-2"></i> Reportes</a>
          <a href="/agregar" class="list-group-item list-group-item-action"><i class="fa-solid fa-plus me-2"></i> Agregar Estudiante</a>
          <a href="/agregar-personal" class="list-group-item list-group-item-action"><i class="fa-solid fa-plus me-2"></i> Agregar Personal</a>
          <a href="/verificacion" class="list-group-item list-group-item-action"><i class="fa-solid fa-check me-2"></i> Verificación</a>
          <a href="/login" class="list-group-item list-group-item-action"><i class="fa-solid fa-sign-out-alt me-2"></i> Salir</a>
        </div>
      </aside>
    </nav>

    <section class="p-4 d-flex justify-content-center w-100">
      <div class="card shadow-sm w-100" style="max-width: 600px;">
        <div class="card-body text-center">
          <h2 class="mb-4">Fecha y Tipo de Reporte</h2>

          <div class="mb-3">
            <label for="fecha_inicio" class="form-label"><strong>Fecha Inicio:</strong></label>
            <input type="date" id="fecha_inicio" name="fecha_inicio" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="fecha_fin" class="form-label"><strong>Fecha Fin:</strong></label>
            <input type="date" id="fecha_fin" name="fecha_fin" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="accion" class="form-label"><strong>¿Qué deseas hacer?</strong></label>
            <select id="accion" class="form-select" onchange="mostrarOpciones()">
              <option value="" disabled selected>-- Selecciona una acción --</option>
              <option value="generar">Generar reporte</option>
              <option value="modificar">Modificar reporte</option>
            </select>
          </div>

          <div id="opciones_generar" style="display:none;">
            <div class="mb-3">
              <label for="reporte" class="form-label"><strong>Tipo de reporte</strong></label>
              <select id="reporte" name="reporte" class="form-select">
                <option value="" disabled selected>-- Selecciona una opción --</option>
                <option value="/reporte-estudiantes-general">Reporte General</option>
                <option value="/reporte-estudiantes-asistencias">Asistencias</option>
                <option value="/reporte-estudiantes-inasistencias">Inasistencias</option>
                <option value="/reporte-estudiantes-justificaciones">Justificaciones</option>
              </select>
            </div>
            <button onclick="redirigir('generar')" class="btn btn-danger">Generar reporte</button>
          </div>

          <div id="opciones_modificar" style="display:none;">
            <button onclick="redirigir('modificar')" class="btn btn-primary">Modificar reporte</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    let params = new URLSearchParams(window.location.search);
    let matricula = params.get("matricula") || localStorage.getItem("matricula");

    if (!matricula) {
      alert("No se encontró la matrícula del estudiante.");
      window.location.href = "/estudiantes";
    }

    function mostrarOpciones() {
      const accion = document.getElementById("accion").value;
      document.getElementById("opciones_generar").style.display = accion === "generar" ? "block" : "none";
      document.getElementById("opciones_modificar").style.display = accion === "modificar" ? "block" : "none";
    }

    function redirigir(tipo) {
      const fechaInicioRaw = document.getElementById("fecha_inicio").value;
      const fechaFinRaw = document.getElementById("fecha_fin").value;

      if (!fechaInicioRaw || !fechaFinRaw) {
        alert("Por favor selecciona el rango de fechas.");
        return;
      }

      if (fechaFinRaw < fechaInicioRaw) {
        alert("La fecha final no puede ser anterior a la fecha de inicio.");
        return;
      }

      const fechaInicio = new Date(fechaInicioRaw);
      const fechaFin = new Date(fechaFinRaw);

      const inicioFormateado = new Date(fechaInicio.getTime() + fechaInicio.getTimezoneOffset() * 60000)
        .toISOString().slice(0, 10);
      const finFormateado = new Date(fechaFin.getTime() + fechaFin.getTimezoneOffset() * 60000)
        .toISOString().slice(0, 10);

      localStorage.setItem("fecha_inicio", inicioFormateado);
      localStorage.setItem("fecha_fin", finFormateado);
      localStorage.setItem("matricula", matricula);

      if (tipo === "generar") {
        const destino = document.getElementById("reporte").value;
        if (!destino) {
          alert("Por favor selecciona un tipo de reporte.");
          return;
        }

        window.location.href = `${destino}?matricula=${encodeURIComponent(matricula)}&inicio=${encodeURIComponent(inicioFormateado)}&fin=${encodeURIComponent(finFormateado)}`;
      }

      if (tipo === "modificar") {
        window.location.href = `/modificar-reporte-estudiantes?matricula=${encodeURIComponent(matricula)}&inicio=${encodeURIComponent(inicioFormateado)}&fin=${encodeURIComponent(finFormateado)}`;
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
