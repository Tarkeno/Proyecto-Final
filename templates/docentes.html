<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/Estilos_Docentes.css') }}">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger" id="Titulo2">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2">
        </a>
        <h1 id="Titulo" class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <div id="titulo2">
    <h2>PANEL ADMINISTRATIVO</h2>
  </div>

  <main class="d-flex" style="height:100vh;">
    <nav class="panel_lateral" style="width:250px;">
      <aside>
        <div class="list-group">
          <a href="/historial" class="list-group-item list-group-item-action"><i class="fa-solid fa-file-lines me-2"></i> Historial</a>
          <a href="/estudiantes" class="list-group-item list-group-item-action"><i class="fa-solid fa-user-graduate me-2"></i> Estudiantes</a>
          <a href="/docentes" class="list-group-item list-group-item-action"><i class="fa-solid fa-chalkboard-user me-2"></i> Personal</a>
          <a href="/reportes" class="list-group-item list-group-item-action"><i class="fa-solid fa-chart-line me-2"></i> Reportes</a>
          <a href="/agregar" class="list-group-item list-group-item-action"><i class="fa-solid fa-plus me-2"></i> Agregar Estudiante</a>
          <a href="/agregar-personal" class="list-group-item list-group-item-action"><i class="fa-solid fa-plus me-2"></i> Agregar Personal</a>
          <a href="/verificacion-usuarios" class="list-group-item list-group-item-action"><i class="fa-solid fa-check me-2"></i> Verificación</a>
          <a href="#" class="list-group-item list-group-item-action" onclick="confirmarSalida(event)"><i class="fa-solid fa-sign-out-alt me-2"></i> Salir</a>
        </div>
      </aside>
    </nav>

    <section class="flex-grow-1 d-flex justify-content-center align-items-start" style="max-width: calc(100% - 250px); min-width: 300px; padding-top: 20px;">
      <div class="card shadow-sm w-100" style="max-width: 500px;">
        <div class="card-body">
          <h4 class="card-title mb-4">Información del Personal</h4>

          <div class="mb-3">
            <label for="clave" class="form-label">
              <i class="fa-solid fa-user me-2"></i> Clave del personal:
            </label>
            <input type="text" id="clave" class="form-control" placeholder="Ingrese la clave del personal" required>
          </div>

          <button id="buscar-btn" class="btn btn-success w-100">BUSCAR PERSONAL</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("buscar-btn").addEventListener("click", function (e) {
      e.preventDefault();
      const clave = document.getElementById("clave").value.trim();

      if (!clave) {
        alert("Por favor ingrese una clave.");
        return;
      }

      fetch("/buscar_personal", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ clave: clave })
      })
      .then(response => response.json())
      .then(data => {
        if (data.error) {
          alert("Personal no encontrado");
        } else {
          localStorage.setItem("personal", JSON.stringify(data));
          window.location.href = "/informacion-docente";
        }
      })
      .catch(error => {
        console.error("Error al buscar personal:", error);
        alert("Error al conectar con el servidor.");
      });
    });

    function confirmarSalida(e) {
      e.preventDefault();
      if (confirm("¿Estás seguro que deseas salir?")) {
        window.location.href = "/login";
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
