<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso a Verificación</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/login.css') }}">

  <style>
    .fondo-login {
      background: url("{{ url_for('static', filename='Images/backgroundCecyteh.png') }}") center/cover no-repeat;
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="{{ url_for('static', filename='Images/cecyteh_horizontal.png') }}" alt="Logo" width="200" class="me-2">
        </a>
        <h1 id="Titulo" class="Titulo">Colegio de Estudios Científicos y Tecnológicos del Estado de Hidalgo</h1>
      </div>
    </nav>
  </header>

  <main>
    <div class="d-flex justify-content-center align-items-center vh-100 fondo-login">
      <div class="card shadow-lg p-4" style="width: 23rem;">
        <h5 class="text-center mb-4 fw-bold">Acceso a Verificación</h5>

        <form id="formAccesoVerificacion">
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="contraseña" class="form-control" placeholder="Contraseña" required>
          </div>

          <button type="submit" class="btn btn-success w-100 mb-2">ENTRAR A VERIFICACIÓN</button>
          <a href="/panel-inicio" class="btn btn-outline-success w-100">VOLVER</a>
        </form>

        <div id="mensajeError" class="alert alert-danger mt-3 d-none" role="alert"></div>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById("formAccesoVerificacion");
    const mensajeError = document.getElementById("mensajeError");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const usuario = document.getElementById("usuario").value.trim();
      const contraseña = document.getElementById("contraseña").value.trim();

      mensajeError.classList.add("d-none");

      fetch("/api/login-verificacion", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, contraseña })
      })
      .then(res => res.json())
.then(data => {
  if (data.success) {
    window.location.href = "/verificacion-usuarios";
  } else {
    mensajeError.textContent = data.message || "❌ No se pudo acceder.";
    mensajeError.classList.remove("d-none");
    setTimeout(() => mensajeError.classList.add("d-none"), 4000);
  }
})
.catch(err => {
  console.error(err);
  mensajeError.textContent = "❌ Error al conectar con el servidor.";
  mensajeError.classList.remove("d-none");
});
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
