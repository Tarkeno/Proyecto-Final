<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificación de Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='Estilos/Verificacion_Usuario.css') }}" />
</head>
<body class="text-center p-4">

  <a href="/verificacion" class="btn btn-secondary volver-btn mb-3">
    <i class="fa-solid fa-arrow-left"></i> Volver
  </a>

  <div class="titulo mb-4">
    <strong>Escanea tu credencial o carnet para registrar tu asistencia</strong>
  </div>

  <div id="reader" style="width:350px; margin:auto;"></div>

  <div id="resultado" class="mt-4"></div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    let ultimoCodigo = null;
    let ultimoTiempo = 0;

    function onScanSuccess(decodedText) {
      const ahora = Date.now();

      if (decodedText === ultimoCodigo && (ahora - ultimoTiempo) < 3000) {
        return;
      }

      ultimoCodigo = decodedText;
      ultimoTiempo = ahora;

      document.getElementById("resultado").innerHTML =
        `<div class="alert alert-info">Código leído: ${decodedText}</div>`;

      let codigo = decodedText;

      if (codigo.includes("codigo_qr=")) {
        const partes = decodedText.split("?");
        if (partes.length > 1) {
          const urlParams = new URLSearchParams(partes[1]);
          codigo = urlParams.get("codigo_qr");
        }
      }

      fetch("/api/registrar-asistencia", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ codigo_qr: codigo })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById("resultado").innerHTML = `
            <div class="card shadow-lg mt-4" style="max-width: 500px; margin:auto;">
              <div class="card-body text-center">
                <h4 class="card-title text-success">${data.message}</h4>
                <p class="card-text">
                  <strong>Nombre:</strong> ${data.nombre || "No disponible"} <br>
                  <strong>Matrícula/Clave:</strong> ${data.matricula || data.clave || "N/A"} <br>
                  <strong>Estado:</strong> ${data.estado || "Asistencia"} <br>
                  <strong>Fecha:</strong> ${new Date().toLocaleString()}
                </p>
              </div>
            </div>
          `;
        } else {
          document.getElementById("resultado").innerHTML = `
            <div class="card shadow-lg mt-4 border-warning" style="max-width: 500px; margin:auto;">
              <div class="card-body text-center">
                <h4 class="card-title text-warning">${data.message}</h4>
                <p class="card-text">
                  <strong>Nombre:</strong> ${data.nombre || "No disponible"} <br>
                  <strong>Matrícula/Clave:</strong> ${data.matricula || data.clave || "N/A"} <br>
                  <strong>Estado:</strong> ${data.estado || "N/A"} <br>
                  <strong>Fecha:</strong> ${new Date().toLocaleString()}
                </p>
              </div>
            </div>
          `;
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById("resultado").innerHTML =
          `<div class="alert alert-danger mt-4">🚨 Error al conectar con el servidor</div>`;
      });
    }

    new Html5QrcodeScanner("reader", {
      fps: 10,
      qrbox: 250
    }).render(onScanSuccess);
  </script>
</body>
</html>
